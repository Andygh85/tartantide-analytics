name: Daily YouTube Snapshot

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6am UTC
  workflow_dispatch:       # Allows manual trigger from GitHub

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run snapshot
        env:
          YOUTUBE_API_KEY:              ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID_RAPID_FIRE_FIVE:   ${{ secrets.CHANNEL_ID_RAPID_FIRE_FIVE }}
          CHANNEL_ID_BORN_TODAY:        ${{ secrets.CHANNEL_ID_BORN_TODAY }}
          CHANNEL_ID_DAILY_HISTORY:     ${{ secrets.CHANNEL_ID_DAILY_HISTORY }}
        run: python snapshot.py

      - name: Commit snapshot data
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/snapshots.json
          git diff --staged --quiet || git commit -m "Daily snapshot $(date +'%Y-%m-%d')"
          git push
