<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tartantide Analytics</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0f1a;
      color: #c0c8d8;
      min-height: 100vh;
    }

    header {
      background: #0f1828;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #1a2a4a;
    }

    header h1 { color: #c0c8d8; font-size: 24px; }

    #last-updated {
      font-size: 12px;
      color: #8090a8;
    }

    #refresh-btn {
      background: #1a2a4a;
      color: #c0c8d8;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    #refresh-btn:hover { background: #2a3a5a; }

    main { padding: 30px; max-width: 1400px; margin: 0 auto; }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #c0c8d8;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a2a4a;
    }

    /* ── Channel Cards ── */
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .channel-card {
      background: #0f1828;
      border-radius: 12px;
      padding: 24px;
      border-top: 4px solid var(--colour);
    }

    .channel-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--colour);
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: #1a2a4a;
      border-radius: 8px;
      padding: 14px;
    }

    .stat-label {
      font-size: 11px;
      color: #8090a8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
    }

    .stat-growth {
      font-size: 12px;
      margin-top: 4px;
    }

    .growth-up   { color: #4caf50; }
    .growth-down { color: #e53935; }
    .growth-none { color: #8090a8; }

    /* ── Charts ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .chart-card {
      background: #0f1828;
      border-radius: 12px;
      padding: 24px;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 700;
      color: #c0c8d8;
      margin-bottom: 16px;
    }

    /* ── Best Performers ── */
    .table-card {
      background: #0f1828;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 40px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      color: #8090a8;
      font-weight: 600;
      border-bottom: 2px solid #1a2a4a;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #1a2a4a;
      color: #c0c8d8;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a2a4a; }

    .channel-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      background: var(--colour);
      color: #0a0f1a;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #8090a8;
      font-size: 16px;
    }

    .error {
      background: #2a1a1a;
      border: 1px solid #e53935;
      border-radius: 8px;
      padding: 16px;
      color: #e53935;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      .channels-grid { grid-template-columns: 1fr; }
      .charts-grid   { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>📊 Tartantide Analytics</h1>
  <div style="display:flex; align-items:center; gap:16px;">
    <span id="last-updated">Loading...</span>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main id="main">
  <div class="loading">Loading analytics data...</div>
</main>

<script>
const CHANNEL_COLOURS = {
  "Rapid Fire Five": "#e07020",
  "Born Today":      "#f0a500",
  "Daily History":   "#4a90d9",
};

const SNAPSHOTS_URL = "https://raw.githubusercontent.com/Andygh85/tartantide-analytics/main/data/snapshots.json";

let snapshots = [];
let charts    = {};

async function loadData() {
  document.getElementById("last-updated").textContent = "Refreshing...";
  try {
    const r = await fetch(SNAPSHOTS_URL + "?t=" + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    snapshots = await r.json();
    render();
    document.getElementById("last-updated").textContent =
      "Last updated: " + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById("main").innerHTML =
      `<div class="error">Failed to load data: ${e.message}</div>`;
  }
}

function getSnapshot(hoursAgo) {
  const target = Date.now() - hoursAgo * 60 * 60 * 1000;
  let closest  = null;
  let minDiff  = Infinity;
  for (const s of snapshots) {
    const diff = Math.abs(new Date(s.timestamp).getTime() - target);
    if (diff < minDiff) {
      minDiff  = diff;
      closest  = s;
    }
  }
  return closest;
}

function formatGrowth(current, previous, key) {
  if (!previous || !previous.channels) return "";
  const prev = Object.values(previous.channels).find((_, i) =>
    Object.keys(previous.channels)[i] === key
  );
  if (!prev) return "";
  const diff = current[key] - prev[key];
  if (diff === 0) return `<span class="growth-none">+0</span>`;
  const cls  = diff > 0 ? "growth-up" : "growth-down";
  const sign = diff > 0 ? "+" : "";
  return `<span class="${cls}">${sign}${diff.toLocaleString()}</span>`;
}

function render() {
  if (!snapshots.length) {
    document.getElementById("main").innerHTML =
      "<div class='loading'>No snapshot data yet — check back tomorrow!</div>";
    return;
  }

  const latest  = snapshots[snapshots.length - 1];
  const snap24h = getSnapshot(24);
  const snap7d  = getSnapshot(24 * 7);

  let html = "";

  // ── Channel Cards ──────────────────────────────────────────────────────────
  html += `<div class="section-title">Channel Overview</div>`;
  html += `<div class="channels-grid">`;

  for (const [name, colour] of Object.entries(CHANNEL_COLOURS)) {
    const stats = latest.channels[name];
    if (!stats) continue;

    const prev24 = snap24h?.channels?.[name];
    const prev7d = snap7d?.channels?.[name];

    const subGrowth24 = prev24 ? stats.subscribers - prev24.subscribers : null;
    const subGrowth7d = prev7d ? stats.subscribers - prev7d.subscribers : null;
    const vwGrowth24  = prev24 ? stats.views - prev24.views : null;
    const vwGrowth7d  = prev7d ? stats.views - prev7d.views : null;

    const fmtGrowth = (val) => {
      if (val === null) return `<span class="growth-none">—</span>`;
      if (val === 0)    return `<span class="growth-none">+0</span>`;
      const cls  = val > 0 ? "growth-up" : "growth-down";
      const sign = val > 0 ? "+" : "";
      return `<span class="${cls}">${sign}${val.toLocaleString()}</span>`;
    };

    html += `
      <div class="channel-card" style="--colour:${colour}">
        <div class="channel-name">${name}</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Subscribers</div>
            <div class="stat-value">${stats.subscribers.toLocaleString()}</div>
            <div class="stat-growth">
              24h: ${fmtGrowth(subGrowth24)} &nbsp;
              7d: ${fmtGrowth(subGrowth7d)}
            </div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Total Views</div>
            <div class="stat-value">${stats.views.toLocaleString()}</div>
            <div class="stat-growth">
              24h: ${fmtGrowth(vwGrowth24)} &nbsp;
              7d: ${fmtGrowth(vwGrowth7d)}
            </div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Videos</div>
            <div class="stat-value">${stats.videos.toLocaleString()}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Views/Video</div>
            <div class="stat-value">${stats.videos ? Math.round(stats.views / stats.videos).toLocaleString() : "—"}</div>
          </div>
        </div>
      </div>`;
  }

  html += `</div>`;

  // ── Charts ─────────────────────────────────────────────────────────────────
  html += `<div class="section-title">Growth Over Time</div>`;
  html += `<div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Subscriber Growth</div>
      <canvas id="subChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">View Growth</div>
      <canvas id="viewChart"></canvas>
    </div>
  </div>`;

  document.getElementById("main").innerHTML = html;

  // Build chart data
  const labels = snapshots.map(s =>
    new Date(s.timestamp).toLocaleDateString("en-GB", { day:"numeric", month:"short" })
  );

  const subDatasets  = [];
  const viewDatasets = [];

  for (const [name, colour] of Object.entries(CHANNEL_COLOURS)) {
    subDatasets.push({
      label:           name,
      data:            snapshots.map(s => s.channels[name]?.subscribers || null),
      borderColor:     colour,
      backgroundColor: colour + "22",
      tension:         0.3,
      fill:            false,
    });
    viewDatasets.push({
      label:           name,
      data:            snapshots.map(s => s.channels[name]?.views || null),
      borderColor:     colour,
      backgroundColor: colour + "22",
      tension:         0.3,
      fill:            false,
    });
  }

  const chartDefaults = {
    responsive: true,
    plugins: {
      legend: { labels: { color: "#c0c8d8", font: { size: 12 } } },
    },
    scales: {
      x: {
        ticks: { color: "#8090a8", maxTicksLimit: 10 },
        grid:  { color: "#1a2a4a" },
      },
      y: {
        ticks: { color: "#8090a8" },
        grid:  { color: "#1a2a4a" },
      },
    },
  };

  new Chart(document.getElementById("subChart"), {
    type:    "line",
    data:    { labels, datasets: subDatasets },
    options: { ...chartDefaults },
  });

  new Chart(document.getElementById("viewChart"), {
    type:    "line",
    data:    { labels, datasets: viewDatasets },
    options: { ...chartDefaults },
  });
}

loadData();
</script>
</body>
</html>
